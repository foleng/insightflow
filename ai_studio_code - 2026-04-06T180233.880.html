<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 问卷架构师 | 下一代智能生成</title>
    <!-- 引入图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --border-color: rgba(255, 255, 255, 0.3);
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 动态背景动画 */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
            filter: blur(80px);
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .container {
            width: 96vw;
            height: 92vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            display: flex;
            overflow: hidden;
        }

        /* 左侧主对话区 */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
        }

        .header {
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area h2 {
            font-size: 1.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .nav-links button {
            background: transparent;
            border: none;
            color: var(--text-sub);
            margin-left: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links button:hover {
            color: #6366f1;
        }

        .chat-content {
            flex: 1;
            padding: 20px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .welcome-card {
            max-width: 500px;
            animation: fadeInUp 0.8s ease-out;
        }

        .ai-icon {
            width: 80px;
            height: 80px;
            background: var(--primary-gradient);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            color: white;
            font-size: 2rem;
        }

        .welcome-card h1 {
            color: var(--text-main);
            margin-bottom: 12px;
            font-size: 2rem;
        }

        .welcome-card p {
            color: var(--text-sub);
            line-height: 1.6;
        }

        /* 输入框区域 */
        .input-area {
            padding: 40px 80px;
        }

        .input-wrapper {
            background: white;
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: #6366f1;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.15);
        }

        input {
            flex: 1;
            border: none;
            outline: none;
            padding: 12px;
            font-size: 1rem;
            color: var(--text-main);
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: var(--primary-gradient);
            border: none;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        /* 右侧生成区 */
        .preview-panel {
            width: 380px;
            background: rgba(255, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
        }

        .preview-header {
            padding: 30px;
            font-weight: 700;
            color: var(--text-main);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .preview-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-sub);
            padding: 40px;
            text-align: center;
        }

        .preview-empty i {
            font-size: 3rem;
            margin-bottom: 20px;
            opacity: 0.2;
        }

        /* 动画 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式适配 */
        @media (max-width: 1024px) {
            .preview-panel { display: none; }
            .chat-content { padding: 20px; }
            .input-area { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <!-- 主对话区域 -->
        <main class="main-chat">
            <header class="header">
                <div class="logo-area">
                    <h2>AI Questionnaire <span style="font-weight: 300;">Architect</span></h2>
                </div>
                <nav class="nav-links">
                    <button><i class="fa-solid fa-clock-rotate-left"></i> 历史记录</button>
                    <button><i class="fa-solid fa-plus"></i> 新对话</button>
                    <button style="color: #ef4444;"><i class="fa-solid fa-right-from-bracket"></i> 退出</button>
                </nav>
            </header>

            <div class="chat-content">
                <div class="welcome-card">
                    <div class="ai-icon">
                        <i class="fa-solid fa-sparkles"></i>
                    </div>
                    <h1>构建您的专业问卷</h1>
                    <p>描述您的需求（例如：类型、主题、受众），我将实时为您生成结构完整、逻辑严密的问卷草案。</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <i class="fa-solid fa-wand-magic-sparkles" style="color: #6366f1; margin-right: 10px;"></i>
                    <input type="text" placeholder="例如：创建一个关于远程办公效率的满意度调研，包含10个问题...">
                    <button class="send-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
                    <span style="font-size: 0.75rem; color: var(--text-sub); background: rgba(0,0,0,0.05); padding: 4px 12px; border-radius: 20px; cursor: pointer;">满意度调查</span>
                    <span style="font-size: 0.75rem; color: var(--text-sub); background: rgba(0,0,0,0.05); padding: 4px 12px; border-radius: 20px; cursor: pointer;">学术研究</span>
                    <span style="font-size: 0.75rem; color: var(--text-sub); background: rgba(0,0,0,0.05); padding: 4px 12px; border-radius: 20px; cursor: pointer;">产品反馈</span>
                </div>
            </div>
        </main>

        <!-- 右侧预览面板 -->
        <aside class="preview-panel">
            <div class="preview-header">
                <i class="fa-solid fa-layer-group" style="color: #a855f7;"></i>
                AI 实时生成预览
            </div>
            <div class="preview-empty">
                <i class="fa-solid fa-file-invoice"></i>
                <p>在左侧输入您的需求<br><span style="font-size: 0.8rem; opacity: 0.7;">问卷内容将在这里实时呈现</span></p>
            </div>
        </aside>
    </div>

    <script>
        // 简单的打字机模拟效果（示意）
        const input = document.querySelector('input');
        const sendBtn = document.querySelector('.send-btn');
        const chatContent = document.querySelector('.chat-content');

        sendBtn.onclick = () => {
            if(input.value.trim() === "") return;
            
            // 改变UI状态的逻辑
            chatContent.innerHTML = `
                <div style="width: 100%; text-align: left; animation: fadeInUp 0.5s ease;">
                    <div style="background: white; padding: 15px 20px; border-radius: 15px; display: inline-block; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
                        ${input.value}
                    </div>
                    <div style="margin-top: 20px; color: #6366f1;">
                        <i class="fa-solid fa-circle-notch fa-spin"></i> 正在深度思考并构建问卷结构...
                    </div>
                </div>
            `;
            input.value = "";
        };

        // 回车发送
        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendBtn.click();
        });
    </script>
</body>
</html>
